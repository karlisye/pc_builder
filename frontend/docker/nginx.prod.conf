# Production config — mounted over /etc/nginx/conf.d/default.conf by
# docker-compose.prod.yml. TLS terminates here with a Cloudflare Origin
# Certificate (Cloudflare SSL mode: Full (strict)); certs are volume-mounted
# from /opt/datorbuve/certs on the host, never baked into the image.

server {
    listen 80;
    server_name datorbuve.lv;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name datorbuve.lv;
    root /usr/share/nginx/html;

    ssl_certificate /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Fingerprinted build output — safe to cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Dynamic sitemap comes from Laravel
    location = /sitemap.xml {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Laravel health endpoint — end-to-end check used after deploys
    location = /up {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API and Sanctum requests to the backend
    location ~ ^/(api|sanctum)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
    }

    # Static files (robots.txt, favicon) served directly; documents and
    # .data requests fall through to the SSR server
    location / {
        try_files $uri @ssr;
    }

    location @ssr {
        proxy_pass http://frontend-ssr:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
