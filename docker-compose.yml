services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/var/www/app
      - ./backend/lang:/var/www/lang
      - ./backend/config:/var/www/config
      - ./backend/routes:/var/www/routes
      - ./backend/tests:/var/www/tests
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    command: php artisan queue:work --tries=3
    volumes:
      - ./backend/app:/var/www/app
      - ./backend/lang:/var/www/lang
      - ./backend/config:/var/www/config
      - ./backend/routes:/var/www/routes
      - ./backend/tests:/var/www/tests
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 5
      interval: 5s
      timeout: 5s
    networks:
      - app

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    volumes:
      - ./backend/.env:/app/.env
    command: python3 server.py
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-pc_builder}
      MYSQL_USER: ${DB_USERNAME:-sail}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-password}"]
      retries: 5
      interval: 5s
      timeout: 5s
    networks:
      - app

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mysql_data:
