# Production compose
# lives at /opt/datorbuve/ on the server
# The real .env.production is created manually on the server and never committed.
services:
  frontend:
    image: registry.gitlab.com/karlisy/pc_builder/frontend-web:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped
    depends_on:
      - backend
      - frontend-ssr
    networks:
      - app

  frontend-ssr:
    image: registry.gitlab.com/karlisy/pc_builder/frontend-ssr:${IMAGE_TAG:-latest}
    environment:
      - API_BASE_URL=http://backend:8000
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app

  backend:
    image: registry.gitlab.com/karlisy/pc_builder/backend:${IMAGE_TAG:-latest}
    env_file:
      - .env.production
    command: sh -c "php artisan config:cache && php artisan route:cache && php-fpm -D && nginx -g 'daemon off;'"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  queue-worker:
    image: registry.gitlab.com/karlisy/pc_builder/backend:${IMAGE_TAG:-latest}
    env_file:
      - .env.production
    command: sh -c "php artisan config:cache && php artisan queue:work --tries=3"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 5
      interval: 5s
      timeout: 5s
    restart: unless-stopped
    networks:
      - app

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-pc_builder}
      MYSQL_USER: ${DB_USERNAME:-sail}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in the shell or an .env file next to this compose file}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in the shell or an .env file next to this compose file}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 5
      interval: 5s
      timeout: 5s
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mysql_data:
