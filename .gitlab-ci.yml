stages:
  - test

tests:
  stage: test
  image: karlisy/php84-ci:latest

  services:
    - name: mysql:8.4
      alias: mysql
      variables:
        MYSQL_DATABASE: pc_builder
        MYSQL_USER: sail
        MYSQL_PASSWORD: $MYSQL_PASSWORD
        MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD

  script:
    - cd website
    - composer install --no-interaction --prefer-dist
    - timeout 60 bash -c "until echo > /dev/tcp/mysql/3306 2>/dev/null; do sleep 1; echo 'waiting...'; done"
    - php artisan key:generate --env=testing
    - php artisan config:clear
    - php artisan migrate --env=testing --force
    - mysql -h mysql -u sail -p$MYSQL_PASSWORD --skip-ssl pc_builder < ../database/testing/components.sql
    - ./vendor/bin/pest tests/Feature/BuilderApiTest.php

  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      when: always
