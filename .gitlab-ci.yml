build:
  stage: build
  image: docker:29-cli
  services:
    - docker:29-dind

  variables:
    DOCKER_TLS_CERTDIR: ''

  script:
    # login to Docker Hub
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

    # build images
    - docker build -t $DOCKERHUB_USERNAME/pc-builder-laravel:$CI_COMMIT_SHA ./website
    - docker build -t $DOCKERHUB_USERNAME/pc-builder-scraper:$CI_COMMIT_SHA ./scraper

    - docker tag $DOCKERHUB_USERNAME/pc-builder-laravel:$CI_COMMIT_SHA $DOCKERHUB_USERNAME/pc-builder-laravel:latest
    - docker tag $DOCKERHUB_USERNAME/pc-builder-scraper:$CI_COMMIT_SHA $DOCKERHUB_USERNAME/pc-builder-scraper:latest

    # push images
    - docker push $DOCKERHUB_USERNAME/pc-builder-laravel:$CI_COMMIT_SHA
    - docker push $DOCKERHUB_USERNAME/pc-builder-scraper:$CI_COMMIT_SHA
    - docker push $DOCKERHUB_USERNAME/pc-builder-laravel:latest
    - docker push $DOCKERHUB_USERNAME/pc-builder-scraper:latest

  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      when: always

deploy_staging:
  stage: deploy
  tags:
    - pcbuilder
  script:
    - cd /srv/pc-builder
    - docker compose pull
    - docker compose up -d
    - docker exec pc-builder-app-1 php artisan migrate --force
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
