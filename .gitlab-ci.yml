stages:
  - test

tests:
  stage: test
  image: php:8.4

  services:
    - name: mysql:8.4
      alias: mysql

  variables:
    MYSQL_DATABASE: pc_builder
    MYSQL_USER: sail
    MYSQL_PASSWORD: $MYSQL_PASSWORD
    MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD

  before_script:
    # install system dependencies
    - apt-get update && apt-get install -y zip unzip git curl libzip-dev libpng-dev libonig-dev libxml2-dev default-mysql-client
    - docker-php-ext-install pdo pdo_mysql zip mbstring

    # install composer
    - cd website
    - curl -sS https://getcomposer.org/installer | php
    - php composer.phar install --no-interaction --prefer-dist

    # inject secrets into .env.testing
    - php artisan key:generate --env=testing

    - echo "MYSQL_PASSWORD length - ${#MYSQL_PASSWORD}"
    - sed -i "s/^DB_PASSWORD=.*/DB_PASSWORD=$MYSQL_PASSWORD/" .env.testing

    # wait for mysql for 1 min
    - docker logs $(docker ps -q) 2>/dev/null || true
    - timeout 90 bash -c "until echo > /dev/tcp/mysql/3306 2>/dev/null; do sleep 2; echo 'waiting...'; done"

    - cat .env.testing
    - mysql -h mysql -u root -p$MYSQL_ROOT_PASSWORD --ssl-mode=DISABLED -e "SELECT user, host, plugin FROM mysql.user;"

    # run migrations and import component data
    - php artisan migrate --env=testing --force
    - mysql -h mysql -u sail -p$MYSQL_PASSWORD --ssl-mode=DISABLED pc_builder < ../database/testing/components.sql

  script:
    - ./vendor/bin/pest tests/Feature/BuilderApiTest.php

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
