stages:
  - test

tests:
  stage: test
  image: karlisy/php84-ci:latest

  services:
    - name: mysql:8.4
      alias: mysql
      variables:
        MYSQL_DATABASE: pc_builder
        MYSQL_USER: sail
        MYSQL_PASSWORD: testing
        MYSQL_ROOT_PASSWORD: testing

  script:
    - cd website
    - curl -sS https://getcomposer.org/installer | php
    - php composer.phar install --no-interaction --prefer-dist
    - timeout 60 bash -c "until echo > /dev/tcp/mysql/3306 2>/dev/null; do sleep 1; echo 'waiting...'; done"
    - mysql -h mysql -u sail -ptesting --skip-ssl pc_builder -e "SELECT 1;"
    - php artisan key:generate --env=testing
    - grep -v "^DB_PASSWORD=" .env.testing > .env.testing.tmp && mv .env.testing.tmp .env.testing
    - echo "DB_PASSWORD=testing" >> .env.testing
    - cat .env.testing
    - php -r "
      define('LARAVEL_START', microtime(true));
      require 'vendor/autoload.php';
      \$app = require 'bootstrap/app.php';
      echo 'DB_PASSWORD- ' . env('DB_PASSWORD') . '\n';
      echo 'DB_HOST- ' . env('DB_HOST') . '\n';
      "
    - php artisan migrate --env=testing --force
    - echo "Migrations done"

  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      when: always
