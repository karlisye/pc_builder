# CI/CD for datorbuve.lv — main is the production branch.
#
# Required CI/CD variables (Settings > CI/CD > Variables):
#   TEST_APP_KEY            any "base64:..." key for the test app (masked)
#   VITE_TURNSTILE_SITE_KEY production Turnstile widget site key
#   SERVER_HOST             VPS IP
#   SERVER_USER             deploy user on the VPS
#   SSH_PRIVATE_KEY         private key for SERVER_USER (type: File)
#
# The full Pest suite runs against the sanitized component fixture in
# backend/database/ci/components-dump.sql.gz (refresh with scripts/make-ci-dump.sh).
#
# Recommended GitLab settings: protect the `production` environment
# (Settings > CI/CD > Protected environments) so only maintainers can deploy.

stages:
  - test
  - build
  - deploy

backend-tests:
  stage: test
  interruptible: true
  image: php:8.4-cli-alpine
  services:
    - name: mysql:8.4
      alias: mysql
  variables:
    MYSQL_DATABASE: pc_builder
    MYSQL_USER: sail
    MYSQL_PASSWORD: cipass
    MYSQL_ROOT_PASSWORD: cipass
    # real env vars beat .env.testing values (DB_HOST=mysql already matches)
    APP_ENV: testing
    APP_KEY: $TEST_APP_KEY
    DB_PASSWORD: cipass
  cache:
    key:
      files:
        - backend/composer.lock
    paths:
      - backend/vendor/
  before_script:
    # mariadb-connector-c supplies caching_sha2_password.so — without it the
    # MariaDB client cannot authenticate against MySQL 8.4 at all
    - apk add --no-cache git unzip mariadb-client mariadb-connector-c $PHPIZE_DEPS
    - docker-php-ext-install pdo_mysql > /dev/null
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  script:
    - cd backend
    - touch .env  # phpdotenv warns if the base .env is missing; testing config comes from .env.testing
    - composer install --no-interaction --prefer-dist
    - php artisan migrate --force
    # Alpine's client is MariaDB, so MySQL's --ssl-mode=DISABLED doesn't exist;
    # keep TLS on but skip cert verification (MariaDB 11.4+ verifies by default
    # and rejects MySQL 8.4's self-signed cert)
    - zcat database/ci/components-dump.sql.gz | mariadb --skip-ssl-verify-server-cert -hmysql -usail -pcipass pc_builder
    - php artisan test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

frontend-build:
  stage: test
  interruptible: true
  image: node:24-alpine
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm run build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

build-images:
  stage: build
  interruptible: true
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build
      --build-arg COMPOSER_FLAGS=--no-dev
      -t "$CI_REGISTRY_IMAGE/backend:latest"
      -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
      backend/
    - docker build
      --target web
      --build-arg VITE_TURNSTILE_SITE_KEY="$VITE_TURNSTILE_SITE_KEY"
      --build-arg VITE_SITE_URL=https://datorbuve.lv
      -t "$CI_REGISTRY_IMAGE/frontend-web:latest"
      -t "$CI_REGISTRY_IMAGE/frontend-web:$CI_COMMIT_SHORT_SHA"
      frontend/
    - docker build
      --target ssr
      --build-arg VITE_TURNSTILE_SITE_KEY="$VITE_TURNSTILE_SITE_KEY"
      --build-arg VITE_SITE_URL=https://datorbuve.lv
      -t "$CI_REGISTRY_IMAGE/frontend-ssr:latest"
      -t "$CI_REGISTRY_IMAGE/frontend-ssr:$CI_COMMIT_SHORT_SHA"
      frontend/
    - docker push --all-tags "$CI_REGISTRY_IMAGE/backend"
    - docker push --all-tags "$CI_REGISTRY_IMAGE/frontend-web"
    - docker push --all-tags "$CI_REGISTRY_IMAGE/frontend-ssr"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  stage: deploy
  image: alpine:3.21
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    # normalize the key: strip CRs and ensure a trailing newline — OpenSSH
    # rejects the file ("error in libcrypto") if the paste lost the final \n
    - tr -d '\r' < "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
    - '[ -n "$(tail -c1 ~/.ssh/id_deploy)" ] && echo >> ~/.ssh/id_deploy || true'
    - chmod 600 ~/.ssh/id_deploy
    - ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - scp -i ~/.ssh/id_deploy docker-compose.prod.yml frontend/docker/nginx.prod.conf "$SERVER_USER@$SERVER_HOST:/opt/datorbuve/"
    # deploy the exact SHA-tagged images from this pipeline, never `latest`
    - ssh -i ~/.ssh/id_deploy "$SERVER_USER@$SERVER_HOST" "IMAGE_TAG=$CI_COMMIT_SHORT_SHA sh -s" < scripts/deploy.sh
    # end-to-end smoke test through Cloudflare -> nginx -> Laravel
    - apk add --no-cache curl
    - curl -fsS -m 15 https://datorbuve.lv/up > /dev/null && echo "https://datorbuve.lv/up OK"
  environment:
    name: production
    url: https://datorbuve.lv
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
